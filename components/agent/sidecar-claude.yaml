apiVersion: v1
kind: Service
metadata:
  name: snapcd-agent-sidecar-claude
  labels:
    app: snapcd-agent-sidecar-claude
spec:
  selector:
    app: snapcd-agent-sidecar-claude
  ports:
    - name: http
      port: 7001
      targetPort: 7001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapcd-agent-sidecar-claude
  labels:
    app: snapcd-agent-sidecar-claude
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snapcd-agent-sidecar-claude
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: snapcd-agent-sidecar-claude
    spec:
      containers:
        - name: snapcd-agent-sidecar-claude
          image: ghcr.io/schrieksoft/snapcd/snapcd-agent-sidecar-claude:1.4.3
          env:
            - name: SNAPCD_SERVER_URL
              value: "http://snapcd-server.snapcd-server.svc.cluster.local:8080"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: snapcd-agent-sidecar-claude-credentials
                  key: ANTHROPIC_API_KEY
          ports:
            - containerPort: 7001
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
